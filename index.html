<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Daily Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; color: #F8FAFC; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
    h1 { color: #22D3EE; font-size: 1.6rem; margin-bottom: 20px; }
    .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
    .filter-bar input, .filter-bar select { background: #1E293B; color: #F8FAFC; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; font-family: inherit; }
    .filter-bar button { background: #22D3EE; color: #0F172A; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-weight: 700; font-family: inherit; }
    .kpi-cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
    .kpi-card { background: #1E293B; border-radius: 12px; padding: 20px 28px; flex: 1; min-width: 160px; border-left: 4px solid #22D3EE; }
    .kpi-card .label { font-size: 0.8rem; color: #94A3B8; margin-bottom: 6px; }
    .kpi-card .value { font-size: 1.8rem; font-weight: 700; color: #22D3EE; }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-box { background: #1E293B; border-radius: 12px; padding: 20px; }
    .chart-box h3 { color: #22D3EE; font-size: 0.95rem; margin-bottom: 14px; }
    table { width: 100%; border-collapse: collapse; background: #1E293B; border-radius: 12px; overflow: hidden; }
    th { background: #0F172A; color: #22D3EE; padding: 12px 16px; text-align: left; font-size: 0.85rem; }
    td { padding: 12px 16px; font-size: 0.85rem; border-top: 1px solid #334155; cursor: pointer; }
    tr:hover td { background: #273548; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; }
    .badge.pos { background: #064e3b; color: #34d399; }
    .badge.neu { background: #1e3a5f; color: #93c5fd; }
    .badge.neg { background: #4c0519; color: #fca5a5; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1E293B; border-radius: 16px; padding: 32px; max-width: 640px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal h2 { color: #22D3EE; margin-bottom: 16px; }
    .modal .close { float: right; background: none; border: none; color: #94A3B8; font-size: 1.4rem; cursor: pointer; }
    .modal-section { margin-bottom: 16px; }
    .modal-section h4 { color: #22D3EE; font-size: 0.85rem; margin-bottom: 6px; }
    .modal-section p, .modal-section li { color: #CBD5E1; font-size: 0.88rem; line-height: 1.6; }
    .modal-section ul { padding-left: 18px; }
    @media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>📊 Marketing Daily Dashboard</h1>

  <div class="filter-bar">
    <label style="color:#94A3B8;font-size:0.85rem;">기간</label>
    <input type="date" id="dateFrom">
    <span style="color:#94A3B8;">~</span>
    <input type="date" id="dateTo">
    <select id="metricFilter">
      <option value="all">전체 지표</option>
      <option value="wireless">무선</option>
      <option value="wired">유선</option>
      <option value="device">단말</option>
      <option value="nps">NPS</option>
    </select>
    <button onclick="applyFilter()">조회</button>
    <button onclick="resetFilter()" style="background:#334155;color:#F8FAFC;">초기화</button>
  </div>

  <div class="kpi-cards">
    <div class="kpi-card"><div class="label">무선 평균 달성률</div><div class="value" id="kpiWireless">-</div></div>
    <div class="kpi-card"><div class="label">유선 평균 달성률</div><div class="value" id="kpiWired">-</div></div>
    <div class="kpi-card"><div class="label">NPS 평균</div><div class="value" id="kpiNps">-</div></div>
    <div class="kpi-card"><div class="label">분석 일수</div><div class="value" id="kpiDays">-</div></div>
  </div>

  <div class="charts">
    <div class="chart-box" id="chartWirelessBox"><h3>📱 무선 달성률 추이</h3><canvas id="chartWireless"></canvas></div>
    <div class="chart-box" id="chartWiredBox"><h3>🌐 유선 달성률 추이</h3><canvas id="chartWired"></canvas></div>
    <div class="chart-box" id="chartNpsBox"><h3>😊 NPS AI만족도 추이</h3><canvas id="chartNps"></canvas></div>
    <div class="chart-box" id="chartDeviceBox"><h3>📦 TAC+ 유치율 추이</h3><canvas id="chartDevice"></canvas></div>
  </div>

  <table id="dataTable">
    <thead><tr>
      <th>날짜</th><th>분위기</th><th>무선달성률</th><th>유선달성률</th><th>NPS</th><th>주요이슈</th>
    </tr></thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modalContent">
      <button class="close" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
      <h2 id="modalDate"></h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const DAILY_DATA = [
      {
        date: "2026-04-09",
        summary: "SIM/중고 표준요금제 0원→6만원 정책 전환(4/13까지 한시). L사 유심교체(4/13~) MNP 기회 포착. 해지쿼터 초과 대리점 긴급 관리 필요.",
        mood: "중립",
        wireless: {
          new: null,
          mnp: null,
          fiveG: null,
          achievement: null,
          notes: "010순증 해지방지 최우선. SIM/중고 표준요금제 6만원 한시 정책. 타사단골 MNP 4/1~4/15 모집 중. 해지쿼터 초과: 무등·무안·월드. ARPU 목표 73,717원."
        },
        wired: {
          broadband: null,
          iptv: null,
          achievement: null,
          notes: "4/8자 유선 실적 진도율 공유. B매장 유선실적 0건 — 집중 관리 필요. 유선=수익 강조."
        },
        device: {
          sales: 44.5,
          notes: "0409 단말배정: S26·플립7·아17·A17. 이17(일반·E) SKN 수거 전 긴급 출고 필요. TAC+ 유치율 44.5% (모수 2,848 / TAC+ 1,266). 고가단말(아17) 판매 확대 필요."
        },
        nps: {
          score: 92.1,
          notes: "AI 만족도 조사 평균 92.1% (2026-04-07 기준). 요금수납·약정할인 중립/비추천 다수 발생. 베스트톡+T혜택 5가지 안내 필수."
        },
        keyEvents: [
          "SIM/중고 표준요금제 0원→6만원 정책 전환 (4/9~4/13 한시, ARPU 제외)",
          "아이폰17(일반·E) 익일 SKN 수거 예정 — 긴급 출고 독려 필요",
          "L사 유심교체 4/13 시작 — MNP·UIT·유선결합 전략 준비 요청",
          "해지쿼터 초과 대리점: 무등·무안·월드 — 자체건 중심 VoC 방지",
          "마스콜3 0건 대리점: 전남목포·대산·그린·백산·주안 (4/13 단말배정 연계)"
        ],
        nextActions: [
          "이17(일반·E) 익일 SKN 수거 전 대리점별 재고 확인 및 최대 출고 독려",
          "4/13 L사 유심교체 대응 — 매장 외부연출·MNP→유선결합 시나리오 교육",
          "무등·무안·월드 해지쿼터 초과 긴급 점검 및 VoC 방지 대책 수립",
          "마스콜3 0건 대리점 40% 달성 일별 체크 계획 수립 (4/13 단말배정 전)",
          "요금수납 비판매성 업무 NPS 개선 — T혜택 5가지 안내·베스트톡 매뉴얼 재공유"
        ],
        policyChanges: "SIM/중고 표준요금제 단가 0원→6만원 (2026.4.9~4.13 한시). 중고010 표준요금제 KPI·ARPU 제외 운영. ZEM요금제 M166·A175군 +10만원. 3월 KPI 제외 운영기간 실적 반영 완료.",
        distributionNotes: "SG 컨테스트: A그룹 1위 무등금프. 타사단골 JUMP UP 4/1~4/15. L사 유심교체 4/13 대응 매장 외부연출 준비 요청. 올스이 유치 스타벅스 쿠폰 구글폼 4/9 마감."
      }
    ];

    let filtered = [];
    let charts = {};

    function applyFilter() {
      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;
      const metric = document.getElementById('metricFilter').value;
      filtered = DAILY_DATA.filter(d => {
        if (from && d.date < from) return false;
        if (to && d.date > to) return false;
        return true;
      }).sort((a,b) => b.date.localeCompare(a.date));
      renderAll(filtered, metric);
    }

    function resetFilter() {
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value = '';
      document.getElementById('metricFilter').value = 'all';
      filtered = [...DAILY_DATA].sort((a,b) => b.date.localeCompare(a.date));
      renderAll(filtered, 'all');
    }

    function avg(arr, fn) {
      const vals = arr.map(fn).filter(v => v !== null && v !== undefined);
      return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '-';
    }

    function renderKPI(data) {
      const wAvg = avg(data, d => d.wireless?.achievement);
      const wiAvg = avg(data, d => d.wired?.achievement);
      const nAvg = avg(data, d => d.nps?.score);
      document.getElementById('kpiWireless').textContent = wAvg !== '-' ? wAvg + '%' : '-';
      document.getElementById('kpiWired').textContent = wiAvg !== '-' ? wiAvg + '%' : '-';
      document.getElementById('kpiNps').textContent = nAvg;
      document.getElementById('kpiDays').textContent = data.length + '일';
    }

    function makeChart(id, label, color, data, keyFn) {
      const ctx = document.getElementById(id).getContext('2d');
      if (charts[id]) charts[id].destroy();
      charts[id] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map(d => d.date).reverse(),
          datasets: [{ label, data: data.map(keyFn).reverse(), borderColor: color, backgroundColor: color+'33', tension: 0.3, fill: true, pointRadius: 4 }]
        },
        options: { plugins: { legend: { labels: { color: '#F8FAFC' } } }, scales: { x: { ticks: { color: '#94A3B8' }, grid: { color: '#1E293B' } }, y: { ticks: { color: '#94A3B8' }, grid: { color: '#334155' } } } }
      });
    }

    function renderCharts(data, metric) {
      const show = (id, visible) => { document.getElementById(id+'Box').style.display = visible ? '' : 'none'; };
      const all = metric === 'all';
      show('chartWireless', all || metric === 'wireless');
      show('chartWired', all || metric === 'wired');
      show('chartNps', all || metric === 'nps');
      show('chartDevice', all || metric === 'device');
      if (all || metric === 'wireless') makeChart('chartWireless', '무선 달성률(%)', '#22D3EE', data, d => d.wireless?.achievement);
      if (all || metric === 'wired') makeChart('chartWired', '유선 달성률(%)', '#6366F1', data, d => d.wired?.achievement);
      if (all || metric === 'nps') makeChart('chartNps', 'NPS AI만족도', '#34D399', data, d => d.nps?.score);
      if (all || metric === 'device') makeChart('chartDevice', 'TAC+ 유치율(%)', '#F59E0B', data, d => d.device?.sales);
    }

    function moodBadge(mood) {
      if (!mood) return '';
      const cls = mood === '긍정' ? 'pos' : mood === '부정' ? 'neg' : 'neu';
      return `<span class="badge ${cls}">${mood}</span>`;
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = data.map(d => `
        <tr onclick="openModal('${d.date}')">
          <td>${d.date}</td>
          <td>${moodBadge(d.mood)}</td>
          <td>${d.wireless?.achievement != null ? d.wireless.achievement + '%' : '-'}</td>
          <td>${d.wired?.achievement != null ? d.wired.achievement + '%' : '-'}</td>
          <td>${d.nps?.score != null ? d.nps.score : '-'}</td>
          <td style="color:#94A3B8">${(d.keyEvents||[]).slice(0,2).join(' / ') || '-'}</td>
        </tr>`).join('');
    }

    function renderAll(data, metric) {
      renderKPI(data);
      renderCharts(data, metric);
      renderTable(data);
    }

    function openModal(date) {
      const d = DAILY_DATA.find(x => x.date === date);
      if (!d) return;
      document.getElementById('modalDate').textContent = '📅 ' + d.date;
      document.getElementById('modalBody').innerHTML = `
        <div class="modal-section"><h4>전반적 요약</h4><p>${d.summary||'-'}</p></div>
        <div class="modal-section"><h4>📱 무선</h4><p>달성률: ${d.wireless?.achievement??'-'}% | 신규: ${d.wireless?.new??'-'} | MNP: ${d.wireless?.mnp??'-'} | 5G: ${d.wireless?.fiveG??'-'}</p><p>${d.wireless?.notes||''}</p></div>
        <div class="modal-section"><h4>🌐 유선</h4><p>달성률: ${d.wired?.achievement??'-'}% | 초고속: ${d.wired?.broadband??'-'} | IPTV: ${d.wired?.iptv??'-'}</p><p>${d.wired?.notes||''}</p></div>
        <div class="modal-section"><h4>📦 단말 / TAC+</h4><p>TAC+유치율: ${d.device?.sales??'-'}% | ${d.device?.notes||'-'}</p></div>
        <div class="modal-section"><h4>😊 NPS</h4><p>AI만족도: ${d.nps?.score??'-'}% | ${d.nps?.notes||'-'}</p></div>
        <div class="modal-section"><h4>📢 정책 변경</h4><p>${d.policyChanges||'-'}</p></div>
        <div class="modal-section"><h4>🤝 유통망 소통</h4><p>${d.distributionNotes||'-'}</p></div>
        <div class="modal-section"><h4>주요 이슈 Top5</h4><ul>${(d.keyEvents||[]).map(e=>'<li>'+e+'</li>').join('')}</ul></div>
        <div class="modal-section"><h4>AI 추천 액션</h4><ul>${(d.nextActions||[]).map(a=>'<li>'+a+'</li>').join('')}</ul></div>
      `;
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('active');
    }

    window.onload = () => resetFilter();
  </script>
</body>
</html>
