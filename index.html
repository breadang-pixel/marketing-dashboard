  <title>Marketing Daily Dashboard</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; color: #F8FAFC; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
    h1 { color: #22D3EE; font-size: 1.6rem; margin-bottom: 20px; }
    .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
    .filter-bar input, .filter-bar select { background: #1E293B; color: #F8FAFC; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; font-family: inherit; }
    .filter-bar button { background: #22D3EE; color: #0F172A; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-weight: 700; font-family: inherit; }
    .kpi-cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
    .kpi-card { background: #1E293B; border-radius: 12px; padding: 20px 28px; flex: 1; min-width: 160px; border-left: 4px solid #22D3EE; }
    .kpi-card .label { font-size: 0.8rem; color: #94A3B8; margin-bottom: 6px; }
    .kpi-card .value { font-size: 1.8rem; font-weight: 700; color: #22D3EE; }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-box { background: #1E293B; border-radius: 12px; padding: 20px; }
    .chart-box h3 { color: #22D3EE; font-size: 0.95rem; margin-bottom: 14px; }
    table { width: 100%; border-collapse: collapse; background: #1E293B; border-radius: 12px; overflow: hidden; }
    th { background: #0F172A; color: #22D3EE; padding: 12px 16px; text-align: left; font-size: 0.85rem; }
    td { padding: 12px 16px; font-size: 0.85rem; border-top: 1px solid #334155; cursor: pointer; }
    tr:hover td { background: #273548; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; }
    .badge.pos { background: #064e3b; color: #34d399; }
    .badge.neu { background: #1e3a5f; color: #93c5fd; }
    .badge.neg { background: #4c0519; color: #fca5a5; }
    .weekly-badge { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 0.7rem; background: #312e81; color: #a5b4fc; margin-left: 6px; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1E293B; border-radius: 16px; padding: 32px; max-width: 640px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal h2 { color: #22D3EE; margin-bottom: 16px; }
    .modal .close { float: right; background: none; border: none; color: #94A3B8; font-size: 1.4rem; cursor: pointer; }
    .modal-section { margin-bottom: 16px; }
    .modal-section h4 { color: #22D3EE; font-size: 0.85rem; margin-bottom: 6px; }
    .modal-section p, .modal-section li { color: #CBD5E1; font-size: 0.88rem; line-height: 1.6; }

</head>

  <h1>📊 Marketing Daily Dashboard</h1>
  <div class="filter-bar">
    <label style="color:#94A3B8;font-size:0.85rem;">기간</label>
    <input type="date" id="dateFrom">
    <span style="color:#94A3B8;">~</span>
    <input type="date" id="dateTo">
    <select id="metricFilter">
      <option value="all">전체 지표</option>
      <option value="wireless">무선</option>
      <option value="wired">유선</option>
      <option value="device">단말</option>
      <option value="nps">NPS</option>
    </select>
    <button onclick="applyFilter()">조회</button>
    <button onclick="resetFilter()" style="background:#334155;color:#F8FAFC;">초기화</button>
  </div>
  <div class="kpi-cards">
    <div class="kpi-card"><div class="label">무선 평균 달성률</div><div class="value" id="kpiWireless">-</div></div>
    <div class="kpi-card"><div class="label">유선 평균 달성률</div><div class="value" id="kpiWired">-</div></div>
    <div class="kpi-card"><div class="label">NPS 평균</div><div class="value" id="kpiNps">-</div></div>
    <div class="kpi-card"><div class="label">분석 일수</div><div class="value" id="kpiDays">-</div></div>
  </div>
  <div class="charts">
    <div class="chart-box" id="chartWirelessBox"><h3>📱 무선 달성률 추이</h3><canvas id="chartWireless"></canvas></div>
    <div class="chart-box" id="chartWiredBox"><h3>🌐 유선 달성률 추이</h3><canvas id="chartWired"></canvas></div>
    <div class="chart-box" id="chartNpsBox"><h3>😊 NPS 추이</h3><canvas id="chartNps"></canvas></div>
    <div class="chart-box" id="chartDeviceBox"><h3>📦 단말 TAC+ 추이</h3><canvas id="chartDevice"></canvas></div>
  </div>
  <table id="dataTable">
    <thead><tr><th>날짜</th><th>분위기</th><th>무선달성률</th><th>유선달성률</th><th>NPS</th><th>주요이슈</th></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">

    let filtered = [], charts = {};
    function applyFilter() {
      const from=document.getElementById('dateFrom').value, to=document.getElementById('dateTo').value, metric=document.getElementById('metricFilter').value;
      filtered=DAILY_DATA.filter(d=>{if(from&&d.date<from)return false;if(to&&d.date>to)return false;return true;}).sort((a,b)=>b.date.localeCompare(a.date));
      renderAll(filtered,metric);
    }
    function resetFilter() {
      document.getElementById('dateFrom').value=''; document.getElementById('dateTo').value=''; document.getElementById('metricFilter').value='all';
      filtered=[...DAILY_DATA].sort((a,b)=>b.date.localeCompare(a.date)); renderAll(filtered,'all');
    }
    function avg(arr,fn){const v=arr.map(fn).filter(x=>x\!==null&&x\!==undefined);return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):'-';}
    function renderKPI(data){
      const wa=avg(data,d=>d.wireless&&d.wireless.achievement), wi=avg(data,d=>d.wired&&d.wired.achievement);
      document.getElementById('kpiWireless').textContent=wa\!=='-'?wa+'%':'-';
      document.getElementById('kpiWired').textContent=wi\!=='-'?wi+'%':'-';
      document.getElementById('kpiNps').textContent=avg(data,d=>d.nps&&d.nps.score);
      document.getElementById('kpiDays').textContent=data.length+'일';
    }
    function makeChart(id,label,color,data,fn){
      const ctx=document.getElementById(id).getContext('2d');
      if(charts[id])charts[id].destroy();
      const s=[...data].sort((a,b)=>a.date.localeCompare(b.date));
      charts[id]=new Chart(ctx,{type:'line',data:{labels:s.map(d=>d.date.slice(5)),datasets:[{label,data:s.map(fn),borderColor:color,backgroundColor:color+'33',tension:0.3,fill:true,pointRadius:4,spanGaps:true}]},options:{plugins:{legend:{labels:{color:'#F8FAFC'}}},scales:{x:{ticks:{color:'#94A3B8'},grid:{color:'#334155'}},y:{ticks:{color:'#94A3B8'},grid:{color:'#334155'}}}}});
    }
    function renderCharts(data,metric){
      const show=(id,v)=>{document.getElementById(id+'Box').style.display=v?'':'none';};
      const all=metric==='all';
      show('chartWireless',all||metric==='wireless'); show('chartWired',all||metric==='wired'); show('chartNps',all||metric==='nps'); show('chartDevice',all||metric==='device');
      if(all||metric==='wireless')makeChart('chartWireless','무선 달성률(%)','#22D3EE',data,d=>d.wireless&&d.wireless.achievement);
      if(all||metric==='wired')makeChart('chartWired','유선 달성률(%)','#6366F1',data,d=>d.wired&&d.wired.achievement);
      if(all||metric==='nps')makeChart('chartNps','NPS','#34D399',data,d=>d.nps&&d.nps.score);
      if(all||metric==='device')makeChart('chartDevice','단말 TAC+(%)','#F59E0B',data,d=>d.device&&d.device.sales);
    }
    function moodBadge(m){if(\!m)return'';const c=m==='긍정'?'pos':m==='부정'?'neg':'neu';return'<span class="badge '+c+'">'+m+'</span>';}
    function renderTable(data){
      document.getElementById('tableBody').innerHTML=data.map(d=>{
        const wA=(d.wireless&&d.wireless.achievement\!=null)?d.wireless.achievement+'%':'-';
        const wiA=(d.wired&&d.wired.achievement\!=null)?d.wired.achievement+'%':'-';
        const n=(d.nps&&d.nps.score\!=null)?d.nps.score:'-';
        const wk=d.isWeeklyGenerated?'<span class="weekly-badge">주간</span>':'';
        const ev=(d.keyEvents||[]).slice(0,2).join(' / ')||'-';
        return '<tr onclick="openModal(\''+d.date+'\')"><td>'+d.date+wk+'</td><td>'+moodBadge(d.mood)+'</td><td>'+wA+'</td><td>'+wiA+'</td><td>'+n+'</td><td style="color:#94A3B8;font-size:0.8rem">'+ev+'</td></tr>';
      }).join('');
    }
    function renderAll(data,metric){renderKPI(data);renderCharts(data,metric);renderTable(data);}
    function openModal(date){
      const d=DAILY_DATA.find(x=>x.date===date); if(\!d)return;
      const wl=d.wireless||{},wd=d.wired||{},nps=d.nps||{},dev=d.device||{};
      document.getElementById('modalDate').textContent='📅 '+d.date+(d.isWeeklyGenerated?' 🗓️ 주간리포트 생성일':'');
      document.getElementById('modalBody').innerHTML=
        '<div class="modal-section"><h4>전반적 요약</h4><p>'+(d.summary||'-')+'</p></div>'+
        '<div class="modal-section"><h4>📱 무선</h4><p>달성률: '+(wl.achievement\!=null?wl.achievement+'%':'-')+' | 신규: '+(wl.new||'-')+' | MNP: '+(wl.mnp||'-')+'</p><p style="color:#94A3B8;font-size:0.82rem">'+(wl.notes||'')+'</p></div>'+
        '<div class="modal-section"><h4>🌐 유선</h4><p>달성률: '+(wd.achievement\!=null?wd.achievement+'%':'-')+' | 초고속: '+(wd.broadband||'-')+' | IPTV: '+(wd.iptv||'-')+'</p><p style="color:#94A3B8;font-size:0.82rem">'+(wd.notes||'')+'</p></div>'+
        '<div class="modal-section"><h4>📦 단말 TAC+</h4><p>유치율: '+(dev.sales\!=null?dev.sales+'%':'-')+'</p><p style="color:#94A3B8;font-size:0.82rem">'+(dev.notes||'')+'</p></div>'+
        '<div class="modal-section"><h4>😊 NPS</h4><p>점수: '+(nps.score\!=null?nps.score:'-')+'</p><p style="color:#94A3B8;font-size:0.82rem">'+(nps.notes||'')+'</p></div>'+
        '<div class="modal-section"><h4>📢 정책 변경</h4><p>'+(d.policyChanges||'-')+'</p></div>'+
        '<div class="modal-section"><h4>🤝 유통망 소통</h4><p>'+(d.distributionNotes||'-')+'</p></div>'+
        '<div class="modal-section"><h4>주요 이슈 Top5</h4><ul>'+(d.keyEvents||[]).map(e=>'<li>'+e+'</li>').join('')+'</ul></div>'+
        '<div class="modal-section"><h4>AI 추천 액션</h4><ul>'+(d.nextActions||[]).map(a=>'<li>'+a+'</li>').join('')+'</ul></div>';
      document.getElementById('modalOverlay').classList.add('active');
    }
    function closeModal(e){if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('active');}
    window.onload=function(){resetFilter();};
  </script>
