<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서광주팀 KPI 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0F172A;color:#F8FAFC;font-family:'Noto Sans KR',sans-serif;padding:20px;min-height:100vh;}
    .header{margin-bottom:18px;}
    .header h1{color:#22D3EE;font-size:1.45rem;margin-bottom:3px;}
    .header p{color:#475569;font-size:0.78rem;}
    .filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:#1E293B;padding:12px 16px;border-radius:10px;margin-bottom:18px;}
    .filter-bar label{color:#94A3B8;font-size:0.78rem;}
    .filter-bar input,.filter-bar select{background:#0F172A;color:#F8FAFC;border:1px solid #334155;border-radius:6px;padding:5px 9px;font-family:inherit;font-size:0.8rem;}
    .filter-bar button{border:none;border-radius:6px;padding:5px 14px;cursor:pointer;font-weight:700;font-family:inherit;font-size:0.8rem;}
    .btn-p{background:#22D3EE;color:#0F172A;}
    .btn-s{background:#334155;color:#F8FAFC;}
    /* KPI Cards */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px;margin-bottom:16px;}
    .kpi-card{background:#1E293B;border-radius:8px;padding:11px 13px;position:relative;overflow:hidden;}
    .kpi-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
    .kc-good::before{background:#34D399;}
    .kc-ok::before{background:#22D3EE;}
    .kc-warn::before{background:#F59E0B;}
    .kc-bad::before{background:#EF4444;}
    .kpi-card .lbl{font-size:0.68rem;color:#94A3B8;margin-bottom:3px;}
    .kpi-card .val{font-size:1.3rem;font-weight:700;}
    .kc-good .val{color:#34D399;}
    .kc-ok .val{color:#22D3EE;}
    .kc-warn .val{color:#F59E0B;}
    .kc-bad .val{color:#EF4444;}
    .kpi-card .sub{font-size:0.65rem;color:#475569;margin-top:2px;}
    /* Legend */
    .legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;padding:8px 12px;background:#1E293B;border-radius:8px;align-items:center;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:0.76rem;}
    .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .legend-ref{color:#EF4444;font-size:0.7rem;display:flex;align-items:center;gap:5px;}
    .legend-ref-line{width:18px;border-top:2px dashed #EF4444;}
    /* Tabs */
    .tabs{display:flex;border-bottom:1px solid #334155;margin-bottom:0;}
    .tab-btn{background:none;border:none;color:#64748B;padding:9px 18px;cursor:pointer;font-family:inherit;font-size:0.83rem;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
    .tab-btn.active{color:#22D3EE;border-bottom-color:#22D3EE;}
    .tab-btn:hover:not(.active){color:#94A3B8;}
    .tab-panel{display:none;padding-top:14px;}
    .tab-panel.active{display:block;}
    /* Charts */
    .charts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
    .chart-card{background:#1E293B;border-radius:10px;padding:13px;}
    .chart-card h3{font-size:0.74rem;color:#94A3B8;margin-bottom:8px;line-height:1.4;}
    .chart-card h3 em{color:#22D3EE;font-style:normal;font-weight:700;}
    /* Table */
    .table-section{background:#1E293B;border-radius:10px;overflow:hidden;margin-top:18px;}
    .table-section-head{color:#22D3EE;font-size:0.85rem;padding:12px 14px;border-bottom:1px solid #334155;}
    .table-scroll{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    th{background:#0F172A;color:#64748B;padding:7px 9px;font-size:0.7rem;text-align:center;border-bottom:1px solid #334155;white-space:nowrap;}
    th.tl{text-align:left;padding-left:14px;}
    td{padding:7px 9px;font-size:0.76rem;text-align:center;border-top:1px solid #1A2744;cursor:pointer;}
    td.tl{text-align:left;padding-left:14px;}
    tr:hover td{background:#1A2744;}
    .vg{color:#34D399;font-weight:600;}
    .vo{color:#22D3EE;}
    .vw{color:#F59E0B;}
    .vb{color:#EF4444;font-weight:600;}
    .vn{color:#334155;}
    .badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:0.65rem;}
    .bp{background:#064e3b;color:#34d399;}
    .bn{background:#1e3a5f;color:#93c5fd;}
    .bb{background:#4c0519;color:#fca5a5;}
    .bwk{background:#312e81;color:#a5b4fc;margin-left:3px;}
    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:999;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:#1E293B;border-radius:14px;padding:22px;width:90%;max-width:780px;max-height:85vh;overflow-y:auto;}
    .modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .modal-hd h2{color:#22D3EE;font-size:0.95rem;}
    .modal-close{background:none;border:none;color:#94A3B8;font-size:1.1rem;cursor:pointer;}
    .msec{margin-bottom:12px;}
    .msec h4{color:#22D3EE;font-size:0.76rem;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #334155;}
    .msec p,.msec li{color:#CBD5E1;font-size:0.8rem;line-height:1.7;}
    .msec ul{padding-left:14px;}
    .kpi-tbl{width:100%;border-collapse:collapse;font-size:0.72rem;margin-top:6px;}
    .kpi-tbl th{background:#0F172A;color:#64748B;padding:4px 7px;text-align:center;}
    .kpi-tbl td{padding:4px 7px;text-align:center;border-top:1px solid #334155;}
    .kpi-tbl tr.sg td{background:#22D3EE11;color:#22D3EE;font-weight:700;}
    @media(max-width:900px){.charts-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:600px){.charts-grid{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  </style>
</head>
<body>

<div class="header">
  <h1>📊 서광주팀 KPI 대시보드</h1>
  <p>팀별 실적 비교 · 달성률 추이 분석 | Marketing Daily Flow</p>
</div>

<div class="filter-bar">
  <label>기간</label>
  <input type="date" id="dateFrom">
  <span style="color:#475569">~</span>
  <input type="date" id="dateTo">
  <label>지표</label>
  <select id="metricFilter">
    <option value="all">전체 지표</option>
    <option value="o10">010</option>
    <option value="mnp">MNP신규(MNO)</option>
    <option value="mvno">MVNO-IN</option>
    <option value="broadband">초고속</option>
    <option value="iptv">IPTV</option>
    <option value="rate1g">1G유치율</option>
    <option value="rateGiga">Giga상품유치율</option>
    <option value="rateTac">TAC+유치율</option>
    <option value="rateMas">마스콜3유치율</option>
  </select>
  <button class="btn-p" onclick="applyFilter()">조회</button>
  <button class="btn-s" onclick="resetFilter()">초기화</button>
</div>

<div class="kpi-grid" id="kpiCards"></div>

<div class="legend">
  <div class="legend-item"><div class="leg-dot" style="background:#6366F1"></div>동광주</div>
  <div class="legend-item"><div class="leg-dot" style="background:#22D3EE;box-shadow:0 0 6px #22D3EE80"></div><strong style="color:#22D3EE">서광주 ★ (우리팀)</strong></div>
  <div class="legend-item"><div class="leg-dot" style="background:#F59E0B"></div>전북</div>
  <div class="legend-item"><div class="leg-dot" style="background:#34D399"></div>제주(합산)</div>
  <div class="legend-ref" style="margin-left:auto"><div class="legend-ref-line"></div>목표선</div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tabBtn0" onclick="switchTab(0)">📊 팀별 비교</button>
  <button class="tab-btn" id="tabBtn1" onclick="switchTab(1)">📈 서광주 추이</button>
</div>

<div class="tab-panel active" id="panel0">
  <div class="charts-grid" id="compareGrid"></div>
</div>
<div class="tab-panel" id="panel1">
  <div class="charts-grid" id="trendGrid"></div>
</div>

<div class="table-section">
  <div class="table-section-head">📋 일별 서광주 KPI 현황</div>
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th class="tl">날짜</th>
          <th>010</th>
          <th>MNP</th>
          <th>MVNO</th>
          <th>초고속</th>
          <th>IPTV</th>
          <th>1G유치율</th>
          <th>Giga유치율</th>
          <th>TAC+</th>
          <th>마스콜3</th>
          <th class="tl" style="min-width:180px">분위기 / 주요이슈</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-hd">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

function getVal(entry, team, key) {
  if (!entry || !entry.teams || !entry.teams[team] || !entry.teams[team][key]) return null;
  const m = entry.teams[team][key];
  const def = KPI_DEF.find(d => d.key === key);
  if (!def) return null;
  if (def.isRate) return m.actual != null ? m.actual : null;
  return m.achievement != null ? m.achievement : null;
}

function getTarget(key) {
  const def = KPI_DEF.find(d => d.key === key);
  return def ? def.tgtLine : null;
}

function statusClass(val, def) {
  if (val == null) return '';
  const tgt = def.tgtLine;
  const ratio = val / tgt;
  if (ratio >= 1.05) return 'kc-good';
  if (ratio >= 1.00) return 'kc-ok';
  if (ratio >= 0.90) return 'kc-warn';
  return 'kc-bad';
}
