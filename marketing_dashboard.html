<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서광주팀 KPI 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0F172A;color:#F8FAFC;font-family:'Noto Sans KR',sans-serif;padding:20px;min-height:100vh;}
    .header{margin-bottom:18px;}
    .header h1{color:#22D3EE;font-size:1.45rem;margin-bottom:3px;}
    .header p{color:#475569;font-size:0.78rem;}
    .filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:#1E293B;padding:12px 16px;border-radius:10px;margin-bottom:18px;}
    .filter-bar label{color:#94A3B8;font-size:0.78rem;}
    .filter-bar input,.filter-bar select{background:#0F172A;color:#F8FAFC;border:1px solid #334155;border-radius:6px;padding:5px 9px;font-family:inherit;font-size:0.8rem;}
    .filter-bar button{border:none;border-radius:6px;padding:5px 14px;cursor:pointer;font-weight:700;font-family:inherit;font-size:0.8rem;}
    .btn-p{background:#22D3EE;color:#0F172A;}
    .btn-s{background:#334155;color:#F8FAFC;}
    /* KPI Cards */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px;margin-bottom:16px;}
    .kpi-card{background:#1E293B;border-radius:8px;padding:11px 13px;position:relative;overflow:hidden;}
    .kpi-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
    .kc-good::before{background:#34D399;}
    .kc-ok::before{background:#22D3EE;}
    .kc-warn::before{background:#F59E0B;}
    .kc-bad::before{background:#EF4444;}
    .kpi-card .lbl{font-size:0.68rem;color:#94A3B8;margin-bottom:3px;}
    .kpi-card .val{font-size:1.3rem;font-weight:700;}
    .kc-good .val{color:#34D399;}
    .kc-ok .val{color:#22D3EE;}
    .kc-warn .val{color:#F59E0B;}
    .kc-bad .val{color:#EF4444;}
    .kpi-card .sub{font-size:0.65rem;color:#475569;margin-top:2px;}
    /* Legend */
    .legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;padding:8px 12px;background:#1E293B;border-radius:8px;align-items:center;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:0.76rem;}
    .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .legend-ref{color:#EF4444;font-size:0.7rem;display:flex;align-items:center;gap:5px;}
    .legend-ref-line{width:18px;border-top:2px dashed #EF4444;}
    /* Tabs */
    .tabs{display:flex;border-bottom:1px solid #334155;margin-bottom:0;}
    .tab-btn{background:none;border:none;color:#64748B;padding:9px 18px;cursor:pointer;font-family:inherit;font-size:0.83rem;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
    .tab-btn.active{color:#22D3EE;border-bottom-color:#22D3EE;}
    .tab-btn:hover:not(.active){color:#94A3B8;}
    .tab-panel{display:none;padding-top:14px;}
    .tab-panel.active{display:block;}
    /* Charts */
    .charts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
    .chart-card{background:#1E293B;border-radius:10px;padding:13px;}
    .chart-card h3{font-size:0.74rem;color:#94A3B8;margin-bottom:8px;line-height:1.4;}
    .chart-card h3 em{color:#22D3EE;font-style:normal;font-weight:700;}
    /* Table */
    .table-section{background:#1E293B;border-radius:10px;overflow:hidden;margin-top:18px;}
    .table-section-head{color:#22D3EE;font-size:0.85rem;padding:12px 14px;border-bottom:1px solid #334155;}
    .table-scroll{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    th{background:#0F172A;color:#64748B;padding:7px 9px;font-size:0.7rem;text-align:center;border-bottom:1px solid #334155;white-space:nowrap;}
    th.tl{text-align:left;padding-left:14px;}
    td{padding:7px 9px;font-size:0.76rem;text-align:center;border-top:1px solid #1A2744;cursor:pointer;}
    td.tl{text-align:left;padding-left:14px;}
    tr:hover td{background:#1A2744;}
    .vg{color:#34D399;font-weight:600;}
    .vo{color:#22D3EE;}
    .vw{color:#F59E0B;}
    .vb{color:#EF4444;font-weight:600;}
    .vn{color:#334155;}
    .badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:0.65rem;}
    .bp{background:#064e3b;color:#34d399;}
    .bn{background:#1e3a5f;color:#93c5fd;}
    .bb{background:#4c0519;color:#fca5a5;}
    .bwk{background:#312e81;color:#a5b4fc;margin-left:3px;}
    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:999;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:#1E293B;border-radius:14px;padding:22px;width:90%;max-width:780px;max-height:85vh;overflow-y:auto;}
    .modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .modal-hd h2{color:#22D3EE;font-size:0.95rem;}
    .modal-close{background:none;border:none;color:#94A3B8;font-size:1.1rem;cursor:pointer;}
    .msec{margin-bottom:12px;}
    .msec h4{color:#22D3EE;font-size:0.76rem;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #334155;}
    .msec p,.msec li{color:#CBD5E1;font-size:0.8rem;line-height:1.7;}
    .msec ul{padding-left:14px;}
    .kpi-tbl{width:100%;border-collapse:collapse;font-size:0.72rem;margin-top:6px;}
    .kpi-tbl th{background:#0F172A;color:#64748B;padding:4px 7px;text-align:center;}
    .kpi-tbl td{padding:4px 7px;text-align:center;border-top:1px solid #334155;}
    .kpi-tbl tr.sg td{background:#22D3EE11;color:#22D3EE;font-weight:700;}
    @media(max-width:900px){.charts-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:600px){.charts-grid{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  </style>
</head>
<body>

<div class="header">
  <h1>📊 서광주팀 KPI 대시보드</h1>
  <p>팀별 실적 비교 · 달성률 추이 분석 | Marketing Daily Flow</p>
</div>

<div class="filter-bar">
  <label>기간</label>
  <input type="date" id="dateFrom">
  <span style="color:#475569">~</span>
  <input type="date" id="dateTo">
  <label>지표</label>
  <select id="metricFilter">
    <option value="all">전체 지표</option>
    <option value="o10">010</option>
    <option value="mnp">MNP신규(MNO)</option>
    <option value="mvno">MVNO-IN</option>
    <option value="broadband">초고속</option>
    <option value="iptv">IPTV</option>
    <option value="rate1g">1G유치율</option>
    <option value="rateGiga">Giga상품유치율</option>
    <option value="rateTac">TAC+유치율</option>
    <option value="rateMas">마스콜3유치율</option>
    <option value="rateNps">NPS_비판매성</option>
    <option value="rateTarget">타사단골모집율</option>
  </select>
  <button class="btn-p" onclick="applyFilter()">조회</button>
  <button class="btn-s" onclick="resetFilter()">초기화</button>
</div>

<div class="kpi-grid" id="kpiCards"></div>

<div class="legend">
  <div class="legend-item"><div class="leg-dot" style="background:#6366F1"></div>동광주</div>
  <div class="legend-item"><div class="leg-dot" style="background:#22D3EE;box-shadow:0 0 6px #22D3EE80"></div><strong style="color:#22D3EE">서광주 ★ (우리팀)</strong></div>
  <div class="legend-item"><div class="leg-dot" style="background:#F59E0B"></div>전북</div>
  <div class="legend-item"><div class="leg-dot" style="background:#34D399"></div>제주(합산)</div>
  <div class="legend-ref" style="margin-left:auto"><div class="legend-ref-line"></div>목표선</div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tabBtn0" onclick="switchTab(0)">📊 팀별 비교</button>
  <button class="tab-btn" id="tabBtn1" onclick="switchTab(1)">📈 서광주 추이</button>
</div>

<div class="tab-panel active" id="panel0">
  <div class="charts-grid" id="compareGrid"></div>
</div>
<div class="tab-panel" id="panel1">
  <div class="charts-grid" id="trendGrid"></div>
</div>

<div class="table-section">
  <div class="table-section-head">📋 일별 서광주 KPI 현황</div>
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th class="tl">날짜</th>
          <th>010</th>
          <th>MNP</th>
          <th>MVNO</th>
          <th>초고속</th>
          <th>IPTV</th>
          <th>1G유치율</th>
          <th>Giga유치율</th>
          <th>TAC+</th>
          <th>마스콜3</th>
          <th>NPS</th>
          <th>타사단골</th>
          <th class="tl" style="min-width:180px">분위기 / 주요이슈</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-hd">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
function getVal(entry, team, key) {
  if (!entry||!entry.teams||!entry.teams[team]||!entry.teams[team][key]) return null;
  const m=entry.teams[team][key];
  const def=KPI_DEF.find(d=>d.key===key);
  if (!def) return null;
  return def.isRate ? (m.actual!=null?m.actual:null) : (m.achievement!=null?m.achievement:null);
}
function statusClass(val,def){
  if(val==null)return'';
  const r=val/def.tgtLine;
  if(r>=1.05)return'kc-good';if(r>=1.00)return'kc-ok';if(r>=0.90)return'kc-warn';return'kc-bad';
}
function valClass(val,def){
  if(val==null)return'vn';
  const r=val/def.tgtLine;
  if(r>=1.05)return'vg';if(r>=1.00)return'vo';if(r>=0.90)return'vw';return'vb';
}

═══════════════════════════════ */
let filtered=[], chartMap={};

function applyFilter(){
  const from=document.getElementById('dateFrom').value, to=document.getElementById('dateTo').value;
  filtered=DAILY_DATA.filter(d=>{
    if(from&&d.date<from)return false;
    if(to&&d.date>to)return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));
  renderAll(filtered, document.getElementById('metricFilter').value);
}
function resetFilter(){
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  document.getElementById('metricFilter').value='all';
  filtered=[...DAILY_DATA].sort((a,b)=>b.date.localeCompare(a.date));
  renderAll(filtered,'all');
}

function renderAll(data,metric){
  renderKPICards(data);
  renderCompareCharts(data,metric);
  renderTrendCharts(data,metric);
  renderTable(data);
}

  const el=document.getElementById('kpiCards');
  if(!latest){el.innerHTML='';return;}
  const sg=latest.teams['서광주'];
  let html='';
  KPI_DEF.forEach(def=>{
    const t=sg[def.key]; if(!t)return;
    const val=def.isRate?t.actual:t.achievement;
    if(val==null)return;
    const tgt=def.isRate?(t.target||def.tgtLine):def.tgtLine;
    const sc=statusClass(val,def);
    html+='<div class="kpi-card '+sc+'"><div class="lbl">서광주 '+def.label+'</div><div class="val">'+val+'%</div><div class="sub">목표 '+tgt+'% · '+latest.date+'</div></div>';
  });
  el.innerHTML=html||'<p style="color:#475569;font-size:0.8rem">팀 데이터 없음</p>';
}

/* ═══════════════════════════════
   COMPARE CHARTS (팀별 bar)
═══════════════════════════════ */
function renderCompareCharts(data,metricFilter){
  const grid=document.getElementById('compareGrid');
  const withTeams=data.filter(d=>d.teams).sort((a,b)=>b.date.localeCompare(a.date));
  const latest=withTeams[0];
  Object.keys(chartMap).filter(k=>k.startsWith('cmp_')).forEach(k=>{if(chartMap[k]){chartMap[k].destroy();delete chartMap[k];}});
  const metricsToShow=metricFilter==='all'?KPI_DEF:KPI_DEF.filter(d=>d.key===metricFilter);
  if(!latest){
    grid.innerHTML='<p style="color:#475569;padding:20px;grid-column:1/-1;font-size:0.82rem">선택 기간에 팀 비교 데이터가 없습니다.</p>';
    return;
  }
  grid.innerHTML=metricsToShow.map(def=>
    '<div class="chart-card"><h3><em>'+def.label+'</em> 팀별 '+(def.isRate?'유치율':'예상달성률')+' ('+latest.date+')</h3><canvas id="cmp_'+def.key+'"></canvas></div>'
  ).join('');
  metricsToShow.forEach(def=>{
    const canvas=document.getElementById('cmp_'+def.key); if(!canvas)return;
    const vals=TEAMS.map(t=>getVal(latest,t,def.key));
    const bgColors=TEAMS.map(t=>t==='서광주'?'#22D3EE':T_COLOR[t]+'55');
    const borderColors=TEAMS.map(t=>t==='서광주'?'#22D3EE':T_COLOR[t]+'AA');
    const borderWidths=TEAMS.map(t=>t==='서광주'?2.5:1);
    chartMap['cmp_'+def.key]=new Chart(canvas,{
      type:'bar',
      data:{labels:TEAMS,datasets:[
        {label:def.isRate?'유치율(%)':'달성률(%)',data:vals,backgroundColor:bgColors,borderColor:borderColors,borderWidth:borderWidths,order:2},
        {type:'line',label:'목표 '+def.tgtLine+'%',data:TEAMS.map(()=>def.tgtLine),borderColor:'#EF444488',borderWidth:1.5,borderDash:[5,5],pointRadius:0,fill:false,order:1}
      ]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){
        if(ctx.datasetIndex===0){const v=ctx.raw;return(def.isRate?'유치율: ':'달성률: ')+(v!=null?v+'%':'-');}
        return ctx.dataset.label;
      }}}},scales:{
        x:{ticks:{color:function(ctx){return TEAMS[ctx.index]==='서광주'?'#22D3EE':'#94A3B8';},font:function(ctx){return{weight:TEAMS[ctx.index]==='서광주'?'700':'400',size:11};}},grid:{color:'#334155'}},
        y:{ticks:{color:'#94A3B8',font:{size:10}},grid:{color:'#334155'},beginAtZero:false}
      }}
    });
  });
}

/* ═══════════════════════════════
   TREND CHARTS (서광주 line)
═══════════════════════════════ */
function renderTrendCharts(data,metricFilter){
  const grid=document.getElementById('trendGrid');
  const sorted=[...data].sort((a,b)=>a.date.localeCompare(b.date));
  Object.keys(chartMap).filter(k=>k.startsWith('trd_')).forEach(k=>{if(chartMap[k]){chartMap[k].destroy();delete chartMap[k];}});
  const metricsToShow=metricFilter==='all'?KPI_DEF:KPI_DEF.filter(d=>d.key===metricFilter);
  grid.innerHTML=metricsToShow.map(def=>
    '<div class="chart-card"><h3>서광주 <em>'+def.label+'</em> '+(def.isRate?'유치율':'달성률')+' 추이</h3><canvas id="trd_'+def.key+'"></canvas></div>'
  ).join('');
  metricsToShow.forEach(def=>{
    const canvas=document.getElementById('trd_'+def.key); if(!canvas)return;
    chartMap['trd_'+def.key]=new Chart(canvas,{
      type:'line',
      data:{labels:sorted.map(d=>d.date.slice(5)),datasets:[
        {label:'서광주',data:sorted.map(d=>getVal(d,'서광주',def.key)),borderColor:'#22D3EE',backgroundColor:'#22D3EE22',tension:0.3,fill:true,pointRadius:5,pointBackgroundColor:'#22D3EE',spanGaps:false,order:2},
        {label:'목표 '+def.tgtLine+'%',data:sorted.map(()=>def.tgtLine),borderColor:'#EF444466',borderWidth:1.5,borderDash:[4,4],pointRadius:0,fill:false,order:1}
      ]},
      options:{responsive:true,plugins:{legend:{labels:{color:'#94A3B8',font:{size:10},boxWidth:12}}},scales:{
        x:{ticks:{color:'#94A3B8',font:{size:10}},grid:{color:'#334155'}},
        y:{ticks:{color:'#94A3B8',font:{size:10}},grid:{color:'#334155'}}
      }}
    });
  });
}

/* ═══════════════════════════════
   TABLE
═══════════════════════════════ */
function fmtCell(val,def){
  if(val==null)return'<span class="vn">-</span>';
  return'<span class="'+valClass(val,def)+'">'+val+'%</span>';
}
function renderTable(data){
  let html='';
  data.forEach(function(d){
    let cells='';
    KPI_DEF.forEach(function(def){cells+='<td>'+fmtCell(getVal(d,'서광주',def.key),def)+'</td>';});
    const moodCls=d.mood==='긍정'?'bp':d.mood==='부정'?'bb':'bn';
    const wk=d.isWeeklyGenerated?'<span class="badge bwk">주간</span>':'';
    const ev=(d.keyEvents||[]).slice(0,1).join('')||'';
    const evTrim=ev.length>28?ev.slice(0,28)+'…':ev;
    html+='<tr onclick="openModal(\''+d.date+'\')"><td class="tl">'+d.date+wk+'</td>'+cells+'<td class="tl"><span class="badge '+moodCls+'">'+(d.mood||'중립')+'</span> <span style="color:#475569;font-size:0.68rem">'+evTrim+'</span></td></tr>';
  });
  document.getElementById('tableBody').innerHTML=html;
}

/* ═══════════════════════════════
   MODAL
═══════════════════════════════ */
function makeKpiTable(d){
  if(!d.teams)return'';
  let html='<div class="msec"><h4>📊 KPI 팀별 비교 (전 지표)</h4><div style="overflow-x:auto"><table class="kpi-tbl"><tr><th>팀</th>';
  KPI_DEF.forEach(function(m){html+='<th>'+m.label+'</th>';});
  html+='</tr>';
  TEAMS.forEach(function(team){
    const isSG=team==='서광주';
    html+='<tr'+(isSG?' class="sg"':'')+'>'+
      '<td>'+(isSG?'★ ':'')+team+'</td>';
    KPI_DEF.forEach(function(def){
      const v=getVal(d,team,def.key);
      if(v==null){html+='<td>-</td>';return;}
      const color=v>=def.tgtLine?'#34D399':v>=def.tgtLine*0.9?'#F59E0B':'#EF4444';
      html+='<td style="color:'+color+'">'+v+'%</td>';
    });
    html+='</tr>';
  });
  html+='</table></div></div>';
  return html;
}
function openModal(date){
  const d=DAILY_DATA.find(function(x){return x.date===date;}); if(!d)return;
  document.getElementById('modalTitle').textContent='📅 '+d.date+(d.isWeeklyGenerated?' 🗓️ 주간':'');
  let html='';
  html+='<div class="msec"><h4>전반적 요약</h4><p>'+(d.summary||'-')+'</p></div>';
  html+=makeKpiTable(d);
  html+='<div class="msec"><h4>📢 정책 변경</h4><p>'+(d.policyChanges||'-')+'</p></div>';
  html+='<div class="msec"><h4>🤝 유통망 소통</h4><p>'+(d.distributionNotes||'-')+'</p></div>';
  html+='<div class="msec"><h4>🔥 주요 이슈 Top5</h4><ul>'+(d.keyEvents||[]).map(function(e){return'<li>'+e+'</li>';}).join('')+'</ul></div>';
  html+='<div class="msec"><h4>✅ AI 추천 액션</h4><ul>'+(d.nextActions||[]).map(function(a){return'<li>'+a+'</li>';}).join('')+'</ul></div>';
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
}
document.getElementById('modalOverlay').addEventListener('click',function(e){
  if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('open');
});

/* ═══════════════════════════════
   TAB SWITCH
═══════════════════════════════ */
function switchTab(idx){
  [0,1].forEach(function(i){
    document.getElementById('panel'+i).classList.toggle('active',i===idx);
    document.getElementById('tabBtn'+i).classList.toggle('active',i===idx);
  });
  const metric=document.getElementById('metricFilter').value;
  if(idx===0)renderCompareCharts(filtered,metric);
  else renderTrendCharts(filtered,metric);
}

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
window.onload=function(){resetFilter();};
</script>
